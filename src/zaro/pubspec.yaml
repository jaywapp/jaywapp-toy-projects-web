name: zaro
description: "Zaro₩ - AI 프로젝트 기반 가계부"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5

  # Google Sign In
  google_sign_in: ^6.2.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Ads
  google_mobile_ads: ^5.3.0

  # Firebase Functions
  cloud_functions: ^5.2.5

  # Charts
  fl_chart: ^0.70.2

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
